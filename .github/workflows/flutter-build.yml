name: Flutter CI/CD

on:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Create proper Flutter project
        run: |
          # حفظ الكود الحالي
          mkdir -p /tmp/saved_code
          cp -r lib /tmp/saved_code/ 2>/dev/null || true
          cp pubspec.yaml /tmp/saved_code/ 2>/dev/null || true
          cp -r assets /tmp/saved_code/ 2>/dev/null || true
          
          # إنشاء مشروع جديد
          cd /tmp
          flutter create flex_yemen --org com.flexyemen
          
          # استعادة الكود
          cp -r /tmp/saved_code/lib/* /tmp/flex_yemen/lib/ 2>/dev/null || true
          cp /tmp/saved_code/pubspec.yaml /tmp/flex_yemen/ 2>/dev/null || true
          cp -r /tmp/saved_code/assets /tmp/flex_yemen/ 2>/dev/null || true
          
          # استبدال المشروع
          rm -rf $GITHUB_WORKSPACE/*
          cp -r /tmp/flex_yemen/* $GITHUB_WORKSPACE/
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Build AppBundle
        run: flutter build appbundle --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
      
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
