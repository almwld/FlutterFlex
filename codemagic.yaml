workflows:
  flex-yemen-android:
    name: Flex Yemen Android
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Create Flutter project structure
        script: |
          mkdir -p /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/
          
          cd /tmp
          flutter create flex_yemen_new --org com.flexyemen
          
          cp -r /tmp/my_code/lib/* /tmp/flex_yemen_new/lib/
          cp /tmp/my_code/pubspec.yaml /tmp/flex_yemen_new/
          
          # إنشاء app_theme.dart صحيح من الصفر
          cat > /tmp/flex_yemen_new/lib/theme/app_theme.dart << 'THEMEFILE'
import 'package:flutter/material.dart';
import 'package:flutter/services.dart';

class AppTheme {
  static const Color goldColor = Color(0xFFD4AF37);
  static const Color darkBackground = Color(0xFF121212);
  static const Color cardDark = Color(0xFF1A1A1A);

  static ThemeData get lightTheme => ThemeData(
    fontFamily: 'Cairo',
    brightness: Brightness.light,
    primaryColor: goldColor,
    scaffoldBackgroundColor: Colors.white,
    useMaterial3: true,
    appBarTheme: const AppBarTheme(
      elevation: 0,
      backgroundColor: Colors.transparent,
      systemOverlayStyle: SystemUiOverlayStyle.dark,
    ),
    cardTheme: const CardThemeData(
      elevation: 4,
      shape: RoundedRectangleBorder(borderRadius: BorderRadius.all(Radius.circular(16))),
    ),
  );

  static ThemeData get darkTheme => ThemeData(
    fontFamily: 'Cairo',
    brightness: Brightness.dark,
    primaryColor: goldColor,
    scaffoldBackgroundColor: darkBackground,
    useMaterial3: true,
    appBarTheme: const AppBarTheme(
      elevation: 0,
      backgroundColor: Colors.transparent,
      systemOverlayStyle: SystemUiOverlayStyle.light,
    ),
    cardTheme: CardThemeData(
      elevation: 4,
      color: cardDark,
      shape: const RoundedRectangleBorder(borderRadius: BorderRadius.all(Radius.circular(16))),
    ),
  );
}
THEMEFILE
          
          rm -rf $CM_BUILD_DIR/*
          cp -r /tmp/flex_yemen_new/* $CM_BUILD_DIR/
      
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build APK
        script: flutter build apk --release
    
    artifacts:
      - build/**/outputs/**/*.apk
