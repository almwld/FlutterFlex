workflows:
  flex-yemen-android:
    name: Flex Yemen Android
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Create Flutter project structure
        script: |
          mkdir -p /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/
          
          cd /tmp
          flutter create flex_yemen_new --org com.flexyemen
          
          cp -r /tmp/my_code/lib/* /tmp/flex_yemen_new/lib/
          
          # تعديل pubspec.yaml لإزالة الأصول المفقودة
          cat > /tmp/flex_yemen_new/pubspec.yaml << 'PUBSPEC'
name: flex_yemen
description: تطبيق فلكس يمن
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
PUBSPEC
          
          rm -rf $CM_BUILD_DIR/*
          cp -r /tmp/flex_yemen_new/* $CM_BUILD_DIR/
      
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build APK
        script: flutter build apk --release
    
    artifacts:
      - build/**/outputs/**/*.apk
