workflows:
  flex-yemen-android:
    name: Flex Yemen Android
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Create Flutter project structure
        script: |
          mkdir -p /tmp/my_code
          cp -r lib /tmp/my_code/
          cp pubspec.yaml /tmp/my_code/
          
          cd /tmp
          flutter create flex_yemen_new --org com.flexyemen
          
          # حذف الملفات القديمة التي ستُستبدل
          rm -f /tmp/my_code/lib/main.dart
          rm -f /tmp/my_code/lib/app.dart
          
          # إنشاء main.dart صحيح
          cat > /tmp/flex_yemen_new/lib/main.dart << 'MAINEOF'
import 'package:flutter/material.dart';
import 'app.dart';

void main() => runApp(const FlexYemenApp());
MAINEOF
          
          # إنشاء app.dart صحيح
          cat > /tmp/flex_yemen_new/lib/app.dart << 'APPEOF'
import 'package:flutter/material.dart';
import 'navigation/main_navigation.dart';
import 'theme/app_theme.dart';

class FlexYemenApp extends StatefulWidget {
  const FlexYemenApp({super.key});

  @override
  State<FlexYemenApp> createState() => _FlexYemenAppState();
}

class _FlexYemenAppState extends State<FlexYemenApp> {
  bool isDarkMode = true;
  int cartCount = 0;

  void toggleTheme() => setState(() => isDarkMode = !isDarkMode);
  void addToCart() => setState(() => cartCount++);

  @override
  Widget build(BuildContext context) {
    return MaterialApp(
      debugShowCheckedModeBanner: false,
      theme: AppTheme.lightTheme,
      darkTheme: AppTheme.darkTheme,
      themeMode: isDarkMode ? ThemeMode.dark : ThemeMode.light,
      home: MainNavigation(
        isDarkMode: isDarkMode,
        cartCount: cartCount,
        onThemeToggle: toggleTheme,
        onAddToCart: addToCart,
      ),
    );
  }
}
APPEOF
          
          # نسخ باقي الملفات (بدون main.dart و app.dart)
          cp -r /tmp/my_code/lib/* /tmp/flex_yemen_new/lib/ 2>/dev/null || true
          cp /tmp/my_code/pubspec.yaml /tmp/flex_yemen_new/
          
          rm -rf $CM_BUILD_DIR/*
          cp -r /tmp/flex_yemen_new/* $CM_BUILD_DIR/
      
      - name: Get dependencies
        script: flutter pub get
      
      - name: Build APK
        script: flutter build apk --release
    
    artifacts:
      - build/**/outputs/**/*.apk
